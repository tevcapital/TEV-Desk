<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEV Desk</title>
    <style>
      :root {
        --bg: #eef3fa;
        --card: #ffffff;
        --ink: #11243e;
        --muted: #59708f;
        --line: #d3deec;
        --accent: #1f6fff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        height: 100vh;
        font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #dce9ff, var(--bg));
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      header { border-bottom: 1px solid var(--line); padding: 16px 18px 14px 80px; }
      h1 { margin: 0; font-size: 18px; letter-spacing: 0.02em; }
      p { margin: 6px 0 0; font-size: 12px; color: var(--muted); }
      .group-label {
        margin: 14px 18px 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .list { overflow-y: auto; padding: 0 10px 12px; }
      .card {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
        text-align: left;
        margin-bottom: 8px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .card:hover { border-color: #9fc0ff; background: #f8fbff; }
      .name { font-weight: 700; font-size: 14px; }
      .company { margin-top: 4px; font-size: 11px; color: var(--muted); }
      footer {
        border-top: 1px solid var(--line);
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        padding: 9px 10px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
      }
      .btn.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .war-room-btn {
        display: block;
        width: calc(100% - 20px);
        margin: 12px 10px 4px;
        border: 1px solid #b3ccff;
        border-radius: 12px;
        background: linear-gradient(135deg, #1e3a5f, #206cf4);
        color: #fff;
        padding: 11px 14px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        text-align: left;
        letter-spacing: 0.01em;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TEV Desk</h1>
      <p>8 agent launcher — AI Leaders Research Desk</p>
    </header>
    <button class="war-room-btn" id="warRoomBtn">⬡ War Room — All Agents</button>
    <div class="list" id="list"></div>
    <footer>
      <button class="btn" id="settingsBtn">Settings</button>
      <button class="btn primary" id="openAllBtn">Open All</button>
    </footer>

    <script>
      async function init() {
        const agents = await window.desk.getAgents();
        const list = document.getElementById('list');
        const research = agents.filter((a) => a.type === 'research');
        const leadership = agents.filter((a) => a.type !== 'research');

        function renderGroup(label, rows) {
          return `
            <div class="group-label">${label}</div>
            ${rows.map((agent) => `
              <button class="card" data-id="${agent.id}">
                <div class="name">${agent.name}</div>
                <div class="company">${agent.company}</div>
              </button>
            `).join('')}
          `;
        }

        list.innerHTML = renderGroup('Research', research) + renderGroup('Leadership', leadership);
        list.querySelectorAll('.card').forEach((btn) => btn.addEventListener('click', () => window.desk.openAgent(btn.dataset.id)));
        document.getElementById('settingsBtn').addEventListener('click', () => window.desk.openAgent('__settings__'));
        document.getElementById('warRoomBtn').addEventListener('click', () => window.desk.openAgent('__warroom__'));
        document.getElementById('openAllBtn').addEventListener('click', async () => {
          for (const agent of agents) {
            await window.desk.openAgent(agent.id);
            await new Promise((resolve) => setTimeout(resolve, 120));
          }
        });
      }

      init();
    </script>
  </body>
</html>
